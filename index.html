<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>busy day</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-state="loading">

  <!-- ── password gate ───────────────────────────────────────── -->
  <section id="gate" class="gate" hidden>
    <form id="gate-form" autocomplete="off">
      <h1>busy day</h1>
      <p class="muted">매일의 날씨로 빚은 1분.</p>
      <input id="gate-input" type="password" placeholder="비밀번호" autofocus required>
      <button type="submit">들어가기</button>
      <p id="gate-error" class="error" hidden>틀렸습니다.</p>
    </form>
  </section>

  <!-- ── main app ────────────────────────────────────────────── -->
  <main id="app" hidden>
    <header class="topbar">
      <div class="brand">busy day</div>
      <div class="meta"><span id="city-name">Seoul</span></div>
    </header>

    <nav class="monthnav">
      <button id="prev-month" aria-label="이전 달">‹</button>
      <h2 id="month-label">—</h2>
      <button id="next-month" aria-label="다음 달">›</button>
    </nav>

    <div class="filterbar" aria-label="날씨 필터">
      <label for="weather-filter">날씨</label>
      <select id="weather-filter">
        <option value="">전체</option>
        <option value="clear">맑음</option>
        <option value="cloudy">흐림</option>
        <option value="rain">비</option>
        <option value="snow">눈</option>
        <option value="windy">바람</option>
        <option value="cold">추운 날</option>
        <option value="hot">더운 날</option>
        <option value="humid">습한 날</option>
      </select>
    </div>

    <section class="calendar" aria-label="달력">
      <div class="weekrow head">
        <span>Su</span><span>Mo</span><span>Tu</span>
        <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <p class="legend">
      <span class="dot dot-on"></span> 곡 있음
      <span class="dot dot-off"></span> 아직 없음
    </p>

    <div class="make-row">
      <button id="make-btn" type="button" class="make">+ 오늘 곡 더 만들기</button>
    </div>
  </main>

  <!-- ── intent picker ───────────────────────────────────────── -->
  <aside id="intent" class="intent-modal" hidden aria-hidden="true">
    <div class="intent-inner">
      <button id="intent-close" class="close" aria-label="닫기">✕</button>
      <h3>어떤 곡으로 듣고 싶나요?</h3>

      <p class="section-label">무드 · 상황</p>
      <div class="intents" id="intent-grid"></div>

      <p class="section-label">장르</p>
      <div class="intents" id="genre-grid"></div>

      <p class="section-label">사운드</p>
      <div class="intents instruments" id="instrument-grid"></div>

      <div class="modal-actions">
        <button id="intent-submit" type="button" class="primary" disabled>곡 만들기</button>
      </div>
    </div>
  </aside>

  <!-- ── compose progress popup (floats over intent modal) ───── -->
  <aside id="progress-modal" class="progress-modal" hidden aria-hidden="true">
    <div class="progress-card">
      <h3>곡을 빚는 중</h3>
      <progress id="prog-bar" max="100" value="0"></progress>
      <p id="prog-eta" class="muted small">—</p>
      <p id="prog-status" class="muted small">워크플로 호출 중…</p>
    </div>
  </aside>

  <!-- ── detail modal ────────────────────────────────────────── -->
  <aside id="detail" class="detail" hidden aria-hidden="true">
    <div class="detail-inner">
      <button id="detail-close" class="close" aria-label="닫기">✕</button>
      <header class="detail-head">
        <h3 id="detail-date">—</h3>
        <p id="detail-meta" class="muted">—</p>
        <p id="detail-created" class="muted small">—</p>
        <div id="detail-variants" class="variant-chips" hidden></div>
      </header>

      <figure class="score">
        <div id="detail-score" class="score-svg" hidden></div>
        <p id="detail-score-empty" class="empty muted">악보 준비 중</p>
      </figure>

      <div class="player">
        <div class="variant-toggle" role="tablist">
          <button data-variant="short" class="active">1분</button>
          <button data-variant="long">2분+</button>
        </div>
        <div class="transport">
          <button id="play-btn" type="button" class="play" disabled>▶</button>
          <progress id="play-progress" max="100" value="0"></progress>
          <span id="play-time" class="muted">0:00 / 0:00</span>
        </div>
        <p id="player-status" class="muted small">피아노 샘플 로딩 중…</p>
      </div>

      <dl id="detail-weather" class="weather"></dl>

      <section class="memo">
        <input id="detail-title" type="text" maxlength="80"
               placeholder="제목 (선택) — 예: 비 오는 화요일">
        <textarea id="detail-notes" rows="3" maxlength="800"
                  placeholder="이 곡에 대한 짧은 메모…"></textarea>
        <p id="detail-memo-status" class="muted small">—</p>
      </section>

      <ul class="downloads" id="detail-downloads"></ul>
    </div>
  </aside>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
