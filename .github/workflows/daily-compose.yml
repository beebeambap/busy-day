name: daily compose

on:
  schedule:
    # 21:00 UTC == 06:00 KST (the next morning).
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD or 'today' (KST)"
        type: string
        default: "today"
      city:
        description: "city id"
        type: string
        default: "seoul"
      variant:
        description: "variant id ('auto' for cron, 'user-HHMM-<intent>' for manual)"
        type: string
        default: "auto"
      intent:
        description: "intent preset (calm/warm/wistful/lively/after_rain/sleep)"
        type: string
        default: ""
      instrument:
        description: "melody instrument (piano/rhodes/nylon/violin/viola/cello/strings/music_box/horn)"
        type: string
        default: ""
      force_genre:
        description: "hard-pin genre (ambient/bossa_nova/jazz_ballad/lo_fi/neo_classical/folk)"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mido verovio requests

      - name: Compose & upload
        env:
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET:   busy-day-archive
        run: |
          DATE="${{ github.event.inputs.date        || 'today'  }}"
          CITY="${{ github.event.inputs.city        || 'seoul'  }}"
          VARIANT="${{ github.event.inputs.variant      || 'auto' }}"
          INTENT="${{ github.event.inputs.intent        || '' }}"
          INSTRUMENT="${{ github.event.inputs.instrument || '' }}"
          FORCE_GENRE="${{ github.event.inputs.force_genre || '' }}"
          ARGS="--date $DATE --city $CITY --variant $VARIANT"
          if [ -n "$INTENT" ];      then ARGS="$ARGS --intent $INTENT";         fi
          if [ -n "$INSTRUMENT" ];  then ARGS="$ARGS --instrument $INSTRUMENT"; fi
          if [ -n "$FORCE_GENRE" ]; then ARGS="$ARGS --force-genre $FORCE_GENRE"; fi
          python -m compose daily $ARGS
